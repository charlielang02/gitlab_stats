name: CI
on:
  pull_request:
  push:
    branches:
      - main
      - develop
permissions:
  contents: read
jobs:
  tests-and-coverage:
    name: Tests and coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install --with dev --with test
      - name: Run tests with coverage gate
        run: |
          poetry run pytest \
            --cov=gitlab_stats \
            --cov-branch \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=80
      - name: Build coverage summary for workflow output
        run: |
          poetry run coverage report -m > coverage.txt
          {
            echo "## Coverage Summary"
            echo
            echo "\`\`\`text"
            cat coverage.txt
            echo "\`\`\`"
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload coverage to Codecov (optional)
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}
